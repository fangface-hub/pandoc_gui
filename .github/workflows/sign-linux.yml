name: Build Linux App, Zip and Sign with Cosign (OIDC)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build-sign-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set release tag from project version
        id: rel
        run: |
          ver=$(python -c "import pathlib,tomllib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8-sig'))['project']['version'])")
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
          echo "name=PandocGUI v$ver" >> "$GITHUB_OUTPUT"

      - name: Build with Nuitka
        run: |
          uv sync --group build --no-dev
          uv run python -m nuitka --standalone --clang --assume-yes-for-downloads --output-dir=dist --output-filename=PandocGUI --include-data-dir=filters=filters --include-data-dir=locales=locales --include-data-dir=stylesheets=stylesheets --include-data-dir=help=help --include-data-dir=profiles=profiles --include-data-dir=mermaid=mermaid --include-data-dir=LICENSES=LICENSES main_window.py

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign PandocGUI executable with OIDC
        run: cosign sign-blob --yes --output-signature dist/main_window.dist/PandocGUI.sig dist/main_window.dist/PandocGUI

      - name: Create ZIP from dist/main_window.dist
        run: |
          cd dist
          zip -r ../PandocGUI-linux.zip main_window.dist

      - name: Sign ZIP with OIDC
        run: cosign sign-blob --yes --output-signature PandocGUI-linux.zip.sig PandocGUI-linux.zip

      - name: Publish Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          draft: false
          prerelease: true
          overwrite_files: true
          files: |
            PandocGUI-linux.zip
            PandocGUI-linux.zip.sig
