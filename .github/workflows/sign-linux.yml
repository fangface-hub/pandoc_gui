name: Build Linux App, Zip and Sign with Cosign (OIDC)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build-sign-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set release tag from project version
        id: rel
        run: |
          ver=$(python -c "import pathlib,tomllib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8-sig'))['project']['version'])")
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
          echo "name=PandocGUI v$ver" >> "$GITHUB_OUTPUT"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: python -m PyInstaller PandocGUI.spec

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign PandocGUI executable with OIDC
        run: cosign sign-blob --yes --output-signature dist/PandocGUI/PandocGUI.sig dist/PandocGUI/PandocGUI

      - name: Create ZIP from dist/PandocGUI
        run: |
          cd dist
          zip -r ../PandocGUI-linux.zip PandocGUI

      - name: Sign ZIP with OIDC
        run: cosign sign-blob --yes --output-signature PandocGUI-linux.zip.sig PandocGUI-linux.zip

      - name: Publish Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          draft: false
          prerelease: true
          overwrite_files: true
          files: |
            PandocGUI-linux.zip
            PandocGUI-linux.zip.sig
